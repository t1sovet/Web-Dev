<h2>Album Details</h2>

@if (album$ | async; as album) {

<p><strong>ID:</strong> {{ album.id }}</p>
<p><strong>User ID:</strong> {{ album.userid }}</p>

<label>Title:</label>
<input [value]="album.title" />

<br /><br />

<button (click)="save()">Save</button>
<button (click)="goToPhoto(album.id)">View Photos</button>
<button (click)="goBack()">Back</button>

} @else {
<p>Loading...</p>
}
